<style>
/* ================================================================
   FORBIDDEN CITY · BRONZE DIVINATION
   故宫风 — 红墙 · 青砖 · 金顶 · 五铢铜绿
   ================================================================ */
:root {
  --bg-deep: #0a0303;
  --bg: #0f0605;
  --wall: #b8382a;
  --wall-dark: #7a1a10;
  --wall-deep: #4a0a06;
  --gold: #c9a040;
  --gold-bright: #e8c860;
  --gold-pale: #f0d890;
  --gold-dim: #8a6830;
  --brick: #585854;
  --brick-light: #8a8a84;
  --brick-dark: #3a3a36;
  --marble: #f0e8d4;
  --marble-dim: #c0b898;
  --patina: #5a7a50;
  --patina-light: #7a9a70;
  --patina-dark: #3a5a30;
  --bronze: #a07040;
  --bronze-light: #c89860;
  --bronze-dark: #6a4020;
  --ember: #e04020;
  --ember-glow: #ff6030;
  --ink: #f0e0cc;
  --ink-dim: #b0a090;
  --ink-muted: #706860;
  --jade: #3a6a4a;
  --radius: 0px;
  --radius-inner: 2px;
  --font-display: "Songti SC", "STSong", "SimSun", "Noto Serif CJK SC", "KaiTi", serif;
  --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --safe-top: env(safe-area-inset-top, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }
body {
  height: 100%; overflow: hidden;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(180,60,30,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(200,160,60,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(80,40,20,0.06) 0%, transparent 50%),
    var(--bg-deep);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
  overscroll-behavior: none;
  display: flex; flex-direction: column; align-items: center;
}

/* === DECORATIVE BACKGROUND TEXTURE === */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: 0.03;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(200,160,60,0.5) 40px, rgba(200,160,60,0.5) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(200,160,60,0.3) 40px, rgba(200,160,60,0.3) 41px);
}

.app-container {
  width: 100%; max-width: 420px; height: 100%;
  display: flex; flex-direction: column;
  padding: var(--safe-top) 16px var(--safe-bottom);
  position: relative; z-index: 1;
}

/* === SCREENS === */
.screen { display: none; flex-direction: column; flex: 1; height: 100%; }
.screen.active { display: flex; }

/* === MEANDER BORDER PATTERN (回纹) === */
.meander-top, .meander-bottom {
  height: 12px; width: 100%;
  background: repeating-linear-gradient(90deg,
    var(--gold-dim) 0px, var(--gold-dim) 2px, transparent 2px, transparent 6px,
    transparent 6px, transparent 10px, var(--gold-dim) 10px, var(--gold-dim) 14px,
    transparent 14px, transparent 16px, transparent 16px, transparent 20px,
    var(--gold-dim) 20px, var(--gold-dim) 22px, transparent 22px, transparent 26px,
    var(--gold-dim) 26px, var(--gold-dim) 30px, transparent 30px, transparent 36px
  );
  opacity: 0.4;
  margin: 4px 0;
}

/* === WELCOME SCREEN === */
.welcome-center {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  gap: 0;
}

/* Trigram crown */
.trigram-crown {
  display: flex; gap: 10px; justify-content: center;
  font-size: 18px; color: var(--gold-dim);
  margin-bottom: 20px; letter-spacing: 1px;
  animation: crownGlow 4s ease-in-out infinite;
}
@keyframes crownGlow {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}

/* Palace gate title block */
.palace-title-block {
  text-align: center; position: relative;
  padding: 24px 32px 20px;
  border: 2px solid var(--gold-dim);
  border-image: linear-gradient(180deg, var(--gold), var(--gold-dim), var(--gold)) 1;
  background: linear-gradient(180deg, rgba(120,30,15,0.3), rgba(60,10,5,0.4), rgba(120,30,15,0.3));
  box-shadow: 0 0 40px rgba(180,50,30,0.15), inset 0 0 60px rgba(200,100,30,0.05);
  margin-bottom: 16px;
}
.palace-title-block::before,
.palace-title-block::after {
  content: '◆'; position: absolute;
  color: var(--gold); font-size: 10px;
}
.palace-title-block::before { top: -7px; left: calc(50% - 24px); }
.palace-title-block::after { top: -7px; left: calc(50% + 18px); }

.title-main {
  font-family: var(--font-display);
  font-size: 64px;
  color: var(--gold);
  letter-spacing: 0.3em;
  line-height: 1.15;
  text-shadow: 0 0 30px rgba(200,160,60,0.4), 0 2px 4px rgba(0,0,0,0.6);
}
.title-divider-row {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin: 6px 0;
}
.title-divider-row .dl {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}
.title-sub {
  font-family: var(--font-display);
  font-size: 18px; color: var(--marble-dim);
  letter-spacing: 0.4em;
}

/* Yin-yang medallion */
.medallion-wrap {
  margin: 20px 0 24px; position: relative;
}
.medallion-ring {
  width: 88px; height: 88px;
  border-radius: 50%;
  border: 2px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px rgba(200,160,60,0.15);
  background: radial-gradient(circle, rgba(30,10,5,0.6), rgba(10,3,3,0.9));
}
.taiji {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(180deg, var(--marble) 0%, var(--marble) 49%, var(--bg-deep) 49.1%, var(--bg-deep) 51%, var(--bg-deep) 100%);
  position: relative;
}
.taiji::before, .taiji::after {
  content: ''; position: absolute; border-radius: 50%;
  width: 50%; height: 50%; left: 25%;
}
.taiji::before {
  top: 0;
  background: radial-gradient(circle, var(--bg-deep) 0%, var(--bg-deep) 24%, var(--marble) 24.1%, var(--marble) 100%);
}
.taiji::after {
  bottom: 0;
  background: radial-gradient(circle, var(--marble) 0%, var(--marble) 24%, var(--bg-deep) 24.1%, var(--bg-deep) 100%);
}

/* Question input — like a stone tablet */
.input-wrapper {
  width: 100%; position: relative; margin-bottom: 24px;
}
.input-wrapper::before {
  content: ''; position: absolute; inset: -1px;
  background: linear-gradient(180deg, var(--gold-dim), transparent 30%, transparent 70%, var(--gold-dim));
  border-radius: 1px; z-index: 0; opacity: 0.5;
}
.question-input {
  width: 100%; position: relative; z-index: 1;
  background: linear-gradient(180deg, rgba(20,10,8,0.95), rgba(12,6,4,0.98));
  border: 1px solid rgba(200,160,60,0.25);
  padding: 16px;
  color: var(--marble);
  font-family: var(--font-body);
  font-size: 15px; line-height: 1.6;
  outline: none; resize: none;
  -webkit-user-select: text; user-select: text;
  transition: border-color 0.5s, box-shadow 0.5s;
}
.question-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(200,130,40,0.12), inset 0 0 20px rgba(200,100,30,0.04);
}
.question-input::placeholder { color: rgba(180,150,120,0.25); }

/* === BUTTONS === */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 10px; border: none;
  font-family: var(--font-body); font-size: 16px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  position: relative; overflow: hidden;
  letter-spacing: 0.08em;
}
.btn:active { transform: scale(0.96); }

.btn-primary {
  width: 100%;
  background: linear-gradient(180deg, #c04028 0%, #8a1a10 100%);
  color: var(--marble);
  padding: 16px 24px; font-weight: 600;
  border: 1px solid var(--gold-dim);
  border-radius: var(--radius);
  box-shadow: 0 2px 16px rgba(180,40,20,0.3), 0 0 0 1px rgba(200,100,40,0.15);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.btn-primary:active {
  background: linear-gradient(180deg, #d05038 0%, #a02018 100%);
  box-shadow: 0 1px 8px rgba(180,40,20,0.25);
}

.btn-secondary {
  width: 100%;
  background: linear-gradient(180deg, rgba(60,40,20,0.6), rgba(40,20,10,0.8));
  color: var(--marble-dim);
  padding: 14px 24px; font-size: 14px;
  border: 1px solid rgba(180,140,80,0.2);
  border-radius: var(--radius);
}
.btn-secondary:active {
  color: var(--gold-bright); border-color: var(--gold);
  box-shadow: 0 0 12px rgba(200,160,60,0.1);
}

/* === CASTING SCREEN === */
.casting-header {
  text-align: center; padding: calc(var(--safe-top) + 8px) 0 4px;
}
.line-palace-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(180deg, rgba(120,30,15,0.5), rgba(60,10,4,0.6));
  border: 1px solid var(--gold-dim);
  padding: 6px 22px;
  font-family: var(--font-display);
  font-size: 18px; color: var(--gold);
  letter-spacing: 0.15em;
}
.badge-lamp {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ember-glow);
  box-shadow: 0 0 8px var(--ember), 0 0 16px rgba(255,96,48,0.3);
  animation: lampFlicker 2s ease-in-out infinite;
}
@keyframes lampFlicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
  30%, 70% { opacity: 0.85; }
}

.progress-row {
  display: flex; justify-content: center; gap: 8px; margin: 10px 0 4px;
}
.progress-slot {
  width: 26px; height: 5px;
  background: var(--brick-dark);
  transition: all 0.5s;
}
.progress-slot.done { background: var(--gold); }
.progress-slot.current {
  background: var(--gold-bright);
  box-shadow: 0 0 8px rgba(232,200,96,0.5);
}

/* Trail */
.trail {
  display: flex; gap: 14px; justify-content: center; align-items: center;
  padding: 6px 0; min-height: 36px;
  flex-wrap: wrap;
}
.trail-item {
  font-family: var(--font-display); font-size: 20px;
  color: var(--gold);
  animation: trailReveal 0.4s ease-out;
}
.trail-item.changing {
  color: var(--ember-glow);
  text-shadow: 0 0 10px rgba(255,96,48,0.5);
}
@keyframes trailReveal {
  0% { opacity: 0; transform: translateY(-8px) scale(0.8); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* === COINS — HAN WUZHU STYLE === */
.coins-stage {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.coins-altar {
  width: 240px; height: 3px;
  background: linear-gradient(90deg, transparent, rgba(200,160,60,0.25), transparent);
  margin-bottom: 24px;
}
.coins-row {
  display: flex; gap: 16px; justify-content: center;
}

/* Han Wuzhu coin */
.coin {
  width: 70px; height: 70px; border-radius: 50%;
  cursor: pointer; position: relative;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 16px; font-weight: bold;
}
.coin:active { transform: scale(0.85); }

/* Heads — aged bronze with gilt highlights */
.coin.heads {
  background:
    radial-gradient(circle at 42% 38%, #d4b060 0%, #b89040 18%, #8a6020 42%, #6a6030 62%, #4a5a30 78%, #3a4a2a 92%, #2a3a20 100%);
  box-shadow:
    0 4px 18px rgba(0,0,0,0.5),
    0 0 0 3px rgba(160,130,60,0.25),
    inset 0 2px 3px rgba(255,220,140,0.12);
  color: #2a1800;
  text-shadow: 0 1px 0 rgba(200,160,80,0.3);
}
.coin.heads::after {
  /* Square hole (方孔) */
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 16px; height: 16px;
  background: rgba(10,3,3,0.7);
  border: 1px solid rgba(180,140,60,0.4);
}
/* Light reflection on heads */
.coin.heads::before {
  content: '';
  position: absolute; top: 14%; left: 22%;
  width: 22%; height: 14%;
  background: rgba(255,220,140,0.12);
  border-radius: 50%;
  transform: rotate(-25deg);
}

/* Tails — green patina, tarnished */
.coin.tails {
  background:
    radial-gradient(circle at 42% 38%, #8a9070 0%, #6a7a50 20%, #4a5a38 45%, #3a4a30 65%, #2a3a28 82%, #1a2a18 100%);
  box-shadow:
    0 4px 18px rgba(0,0,0,0.5),
    0 0 0 3px rgba(100,120,80,0.2),
    inset 0 1px 2px rgba(180,200,140,0.06);
  color: var(--ink-dim);
}
.coin.tails::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 16px; height: 16px;
  background: rgba(10,3,3,0.7);
  border: 1px solid rgba(120,140,90,0.35);
}
.coin.tails::before {
  content: '';
  position: absolute; top: 16%; left: 24%;
  width: 18%; height: 10%;
  background: rgba(200,220,160,0.06);
  border-radius: 50%;
  transform: rotate(-25deg);
}

/* Coin roll animation */
.coin.rolling {
  animation: coinRoll 0.5s ease-out;
}
@keyframes coinRoll {
  0% { transform: rotateY(0) scale(1); }
  30% { transform: rotateY(180deg) scale(0.7); }
  60% { transform: rotateY(360deg) scale(0.65); }
  85% { transform: rotateY(540deg) scale(0.85); }
  100% { transform: rotateY(720deg) scale(1); }
}

/* Result reveal */
.result-reveal {
  text-align: center; margin-top: 16px;
  padding: 8px 28px;
  background: linear-gradient(180deg, rgba(120,30,15,0.2), transparent);
  border-top: 1px solid rgba(200,160,60,0.1);
  border-bottom: 1px solid rgba(200,160,60,0.1);
}
.result-label {
  font-family: var(--font-display);
  font-size: 30px; color: var(--ink);
  letter-spacing: 0.1em;
  transition: color 0.3s;
}
.result-label.changing { color: var(--ember-glow); }
.combo-sub {
  font-size: 12px; color: var(--ink-dim);
  margin-bottom: 2px;
}

/* Casting actions */
.casting-actions {
  display: flex; flex-direction: column; gap: 10px;
  padding-bottom: var(--safe-bottom);
}

/* === RESULT SCREEN === */
.result-scroll {
  flex: 1; overflow-y: auto; padding: 0 0 16px;
  -webkit-overflow-scrolling: touch;
  -webkit-user-select: text; user-select: text;
}

/* Hexagram header — imperial presentation */
.hex-palace-header {
  text-align: center; padding: 16px 12px 12px;
  position: relative;
  border: 2px solid var(--gold-dim);
  border-image: linear-gradient(180deg, var(--gold), rgba(200,160,60,0.3), var(--gold)) 1;
  background: linear-gradient(180deg, rgba(100,25,10,0.25), rgba(40,8,3,0.4), rgba(100,25,10,0.25));
  margin-bottom: 16px;
}
.hex-char-frame {
  display: inline-block; padding: 4px 32px;
  border: 1px solid rgba(200,160,60,0.25);
  background: rgba(10,3,3,0.5);
}
.hex-symbol {
  font-size: 76px; line-height: 1.1;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(200,160,60,0.35);
}
.hex-name {
  font-family: var(--font-display);
  font-size: 24px; color: var(--gold);
  margin-top: 8px; letter-spacing: 0.2em;
}
.hex-id-tag {
  display: inline-block;
  font-size: 11px; color: var(--ink-dim);
  border: 1px solid rgba(200,160,60,0.2);
  padding: 2px 12px; margin-top: 2px;
  letter-spacing: 0.1em;
}

/* Lines art — gold roof-ridge style */
.lines-stage {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  padding: 12px 0 16px;
  border-bottom: 2px solid rgba(200,160,60,0.15);
  margin-bottom: 12px;
}
.line-art-row {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-display);
}
.line-symbol-art { font-size: 20px; color: var(--gold); width: 34px; text-align: center; }
.line-drawing {
  width: 200px; height: 10px; position: relative;
  transition: background 0.3s;
}
.line-drawing.yang {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold) 40%, var(--gold-dim) 100%);
  box-shadow: 0 1px 6px rgba(200,160,60,0.3);
}
.line-drawing.yin {
  background: transparent;
}
.line-drawing.yin::before, .line-drawing.yin::after {
  content: ''; position: absolute; top: 0;
  width: 85px; height: 10px;
  background: linear-gradient(180deg, var(--gold-bright), var(--gold) 40%, var(--gold-dim) 100%);
  box-shadow: 0 1px 6px rgba(200,160,60,0.3);
}
.line-drawing.yin::before { left: 0; }
.line-drawing.yin::after { right: 0; }
.line-mark-art {
  font-size: 15px; color: var(--ember-glow);
  width: 24px; text-align: center;
  text-shadow: 0 0 8px rgba(255,96,48,0.4);
}
.line-label-art {
  font-size: 11px; color: var(--ink-dim);
  width: 32px; text-align: right;
}

/* Transformed section — like a side gate */
.transformed-block {
  text-align: center; padding: 14px 0; margin: 0 0 16px;
  border: 1px solid rgba(200,160,60,0.12);
  background: linear-gradient(180deg, rgba(60,40,20,0.2), rgba(40,20,8,0.3), rgba(60,40,20,0.2));
}
.trans-badge {
  font-size: 10px; color: var(--ink-dim);
  letter-spacing: 0.25em; margin-bottom: 6px;
}
.trans-symbol {
  font-size: 44px; color: var(--gold-dim);
}
.trans-name {
  font-family: var(--font-display);
  font-size: 16px; color: var(--marble-dim);
  margin-top: 2px;
}

/* Interpretation cards — red lacquer + gold trim */
.interp-card {
  background: linear-gradient(180deg, rgba(100,25,10,0.25), rgba(50,10,4,0.35));
  border: 1px solid rgba(200,160,60,0.15);
  border-left: 3px solid var(--wall);
  padding: 16px;
  margin-bottom: 12px;
}
.interp-card.changing-card {
  border-left: 3px solid var(--ember);
}
.card-label-text {
  font-family: var(--font-display);
  font-size: 11px; color: var(--gold-dim);
  letter-spacing: 0.2em; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.card-label-text::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(200,160,60,0.2), transparent);
}
.card-body {

/* ================================================================
   AUDIO ENGINE — Web Audio synthesis, no audio files
   ================================================================ */
class AudioEngine {
  constructor() { this.ctx = null; }
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  _ensure() {
    if (!this.ctx) this.init();
    if (!this.ctx) return null;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return this.ctx;
  }
  coinClink(delay = 0) {
    const ctx = this._ensure(); if (!ctx) return;
    const t = ctx.currentTime + delay;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, t);
    osc.frequency.exponentialRampToValueAtTime(880, t + 0.04);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
  }
  coinToss() {
    const ctx = this._ensure(); if (!ctx) return;
    const bufferSize = ctx.sampleRate * 0.06;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.015));
    const noise = ctx.createBufferSource(); noise.buffer = buffer;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.06, ctx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    noise.connect(noiseGain); noiseGain.connect(ctx.destination);
    noise.start(ctx.currentTime);
    this.coinClink(0); this.coinClink(0.03); this.coinClink(0.06);
  }
  coinLand() {
    const ctx = this._ensure(); if (!ctx) return;
    setTimeout(() => {
      if (!ctx) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.15);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.25);
    }, 120);
  }
  complete() {
    const ctx = this._ensure(); if (!ctx) return;
    [523, 659, 784, 1047].forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.1;
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.4);
    });
  }
}

/* ================================================================
   HAPTIC ENGINE — iOS switch hack
   ================================================================ */
class HapticEngine {
  constructor() {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    this.supported = isIOS;
  }
  pulse() {
    if (!this.supported) return;
    try {
      const id = 'hx-' + Date.now();
      const input = document.createElement('input'); const label = document.createElement('label');
      input.type = 'checkbox'; input.setAttribute('switch', ''); input.id = id;
      input.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;';
      label.setAttribute('for', id);
      label.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;';
      document.body.appendChild(input); document.body.appendChild(label);
      label.click();
      setTimeout(() => { document.body.removeChild(input); document.body.removeChild(label); }, 50);
    } catch(e) {}
  }
}

/* ================================================================
   HEXAGRAM DATA — 64 hexagrams, King Wen order
   Source: Jason-W507/I_Ching_Divination gua_yao_ci.json, verified
   ================================================================ */
const HEXAGRAMS = {
  "111111":{"id":1,"name_cn":"乾","full_name":"乾为天","gua_ci":"乾：元亨。利貞。","yao_ci":["初九：潛龍勿用。","九二：見龍在田，利見大人。","九三：君子終日乾乾，夕惕若；厲，无咎。","九四：或躍在淵，无咎。","九五：飛龍在天，利見大人。","上九：亢龍，有悔。"],"tuan_ci":"大哉乾元，萬物資始，乃統天。雲行雨施，品物流形，大明終始，六位時成。時乘六龍以御天，乾道變化，各正性命，保合大和，乃利貞。首出庶物，萬國咸寧。","da_xiang_ci":"天行健，君子以自強不息。","yong_jiu":"用九：見羣龍无首，吉。"},
  "000000":{"id":2,"name_cn":"坤","full_name":"坤为地","gua_ci":"坤：元亨。利牝馬之貞。","yao_ci":["初六：履霜，堅冰至。","六二：直方大，不習无不利。","六三：含章，可貞。或從王事，无成有終。","六四：括囊，无咎无譽。","六五：黃裳，元吉。","上六：龍戰于野，其血玄黃。"],"tuan_ci":"至哉坤元，萬物資生，乃順承天。坤厚載物，德合无疆；含弘光大，品物咸亨。牝馬地類，行地无疆，柔順利貞。君子攸行，先迷失道，後順得常。西南得朋，乃與類行，東北喪朋，乃終有慶。安貞之吉，應地无疆。","da_xiang_ci":"地勢坤，君子以厚德載物。","yong_liu":"用六：利永貞。"},
  "100010":{"id":3,"name_cn":"屯","full_name":"水雷屯","gua_ci":"屯：元亨，利貞。勿用有攸往，利建侯。","yao_ci":["初九：磐桓，利居貞，利建侯。","六二：屯如邅如，乘馬班如，匪寇婚媾，女子貞不字，十年乃字。","六三：即鹿无虞，惟入于林中，君子幾不如舍，往吝。","六四：乘馬班如，求婚媾，往，吉无不利。","九五：屯其膏；小貞吉，大貞凶。","上六：乘馬班如，泣血漣如。"],"tuan_ci":"屯，剛柔始交而難生，動乎險中，大亨貞。雷雨之動滿盈，天造草昧，宜建侯而不寧。","da_xiang_ci":"雲雷，屯；君子以經綸。"},
  "010001":{"id":4,"name_cn":"蒙","full_name":"山水蒙","gua_ci":"蒙：亨。匪我求童蒙，童蒙求我。初筮告，再三瀆，瀆則不告。利貞。","yao_ci":["初六：發蒙，利用刑人，用說桎梏，以往吝。","九二：包蒙吉，納婦吉，子克家。","六三：勿用取女，見金夫，不有躬，无攸利。","六四：困蒙，吝。","六五：童蒙，吉。","上九：擊蒙，不利為寇，利禦寇。"],"tuan_ci":"蒙，山下有險，險而止，蒙。蒙亨，以亨行，時中也。匪我求童蒙，童蒙求我，志應也。初筮告，以剛中也。再三瀆，瀆則不告，瀆蒙也。蒙以養正，聖功也。","da_xiang_ci":"山下出泉，蒙；君子以果行育德。"},
  "010111":{"id":5,"name_cn":"需","full_name":"水天需","gua_ci":"需：有孚，光亨。貞吉，利涉大川。","yao_ci":["初九：需于郊，利用恆，无咎。","九二：需于沙，小有言，終吉。","九三：需于泥，致寇至。","六四：需于血，出自穴。","九五：需于酒食，貞吉。","上六：入于穴，有不速之客三人來，敬之終吉。"],"tuan_ci":"需，須也，險在前也；剛健而不陷，其義不困窮矣。需，有孚，光亨，貞吉，位乎天位，以正中也。利涉大川，往有功也。","da_xiang_ci":"雲上於天，需；君子以飲食宴樂。"},
  "111010":{"id":6,"name_cn":"訟","full_name":"天水讼","gua_ci":"訟：有孚，窒，惕，中吉，終凶。利見大人，不利涉大川。","yao_ci":["初六：不永所事，小有言，終吉。","九二：不克訟，歸而逋，其邑人三百戶无眚。","六三：食舊德，貞厲，終吉。或從王事，无成。","九四：不克訟，復即命渝，安貞吉。","九五：訟，元吉。","上九：或錫之鞶帶，終朝三褫之。"],"tuan_ci":"訟，上剛下險，險而健，訟。訟，有孚，窒，惕，中吉，剛來而得中也。終凶，訟不可成也。利見大人，尚中正也。不利涉大川，入于淵也。","da_xiang_ci":"天與水違行，訟；君子以作事謀始。"},
  "000010":{"id":7,"name_cn":"師","full_name":"地水师","gua_ci":"師：貞丈人吉，无咎。","yao_ci":["初六：師出以律，否臧，凶。","九二：在師中吉，无咎；王三錫命。","六三：師或輿尸，凶。","六四：師左次，无咎。","六五：田有禽，利執言，无咎。長子帥師，弟子輿尸，貞凶。","上六：大君有命，開國承家，小人勿用。"],"tuan_ci":"師，眾也。貞，正也。能以眾正，可以王矣。剛中而應，行險而順，以此毒天下，而民從之，吉又何咎矣。","da_xiang_ci":"地中有水，師；君子以容民畜衆。"},
  "010000":{"id":8,"name_cn":"比","full_name":"水地比","gua_ci":"比：吉。原筮元永貞，无咎。不寧方來，後夫凶。","yao_ci":["初六：有孚，比之，无咎。有孚盈缶，終來有它，吉。","六二：比之自內，貞吉。","六三：比之匪人。","六四：外比之，貞吉。","九五：顯比。王用三驅，失前禽，邑人不誡，吉。","上六：比之无首，凶。"],"tuan_ci":"比，吉也。比，輔也，下順從也。原筮，元永貞，无咎，以剛中也。不寧方來，上下應也。後夫凶，其道窮也。","da_xiang_ci":"地上有水，比；先王以建萬國，親諸侯。"},
  "110111":{"id":9,"name_cn":"小畜","full_name":"风天小畜","gua_ci":"小畜：亨。密雲不雨，自我西郊。","yao_ci":["初九：復自道，何其咎，吉。","九二：牽復，吉。","九三：輿說輻，夫妻反目。","六四：有孚，血去惕出，无咎。","九五：有孚攣如，富以其鄰。","上九：既雨既處，尚德載，婦貞厲，月幾望，君子征凶。"],"tuan_ci":"小畜，柔得位而上下應之，曰小畜。健而巽，剛中而志行，乃亨。密雲不雨，尚往也。自我西郊，施未行也。","da_xiang_ci":"風行天上，小畜，君子以懿文德。"},
  "111011":{"id":10,"name_cn":"履","full_name":"天泽履","gua_ci":"履虎尾，不咥人，亨。","yao_ci":["初九：素履，往无咎。","九二：履道坦坦，幽人貞吉。","六三：眇能視，跛能履，履虎尾，咥人，凶。武人為于大君。","九四：履虎尾，愬愬終吉。","九五：夬履，貞厲。","上九：視履考祥，其旋元吉。"],"tuan_ci":"履，柔履剛也。說而應乎乾，是以履虎尾，不咥人，亨。剛中正，履帝位而不疚，光明也。","da_xiang_ci":"上天下澤，履；君子以辨上下，定民志。"},
  "000111":{"id":11,"name_cn":"泰","full_name":"地天泰","gua_ci":"泰：小往大來，吉亨。","yao_ci":["初九：拔茅茹以其彙，征吉。","九二：包荒。用馮河，不遐遺；朋亡。得尚于中行。","九三：无平不陂，无往不復，艱貞无咎。勿恤其孚，于食有福。","六四：翩翩，不富以其鄰；不戒以孚。","六五：帝乙歸妹，以祉，元吉。","上六：城復于隍，勿用師，自邑告命，貞吝。"],"tuan_ci":"泰，小往大來，吉亨。則是天地交而萬物通也，上下交而其志同也。內陽而外陰，內健而外順，內君子而外小人，君子道長，小人道消也。","da_xiang_ci":"天地交，泰；后以財成天地之道，輔相天地之宜，以左右民。"},
  "111000":{"id":12,"name_cn":"否","full_name":"天地否","gua_ci":"否之匪人，不利君子貞，大往小來。","yao_ci":["初六：拔茅茹以其彙，貞吉。亨。","六二：包承，小人吉，大人否。亨。","六三：包羞。","九四：有命，无咎，疇離祉。","九五：休否，大人吉。其亡其亡，繫于苞桑。","上九：傾否，先否後喜。"],"tuan_ci":"否之匪人，不利君子貞，大往小來。則是天地不交而萬物不通也，上下不交而天下无邦也。內陰而外陽，內柔而外剛，內小人而外君子，小人道長，君子道消也。","da_xiang_ci":"天地不交，否；君子以儉德辟難，不可榮以祿。"},
  "111101":{"id":13,"name_cn":"同人","full_name":"天火同人","gua_ci":"同人于野，亨。利涉大川，利君子貞。","yao_ci":["初九：同人于門，無咎。","六二：同人于宗，吝。","九三：伏戎于莽，升其高陵，三歲不興。","九四：乘其墉，弗克，攻吉。","九五：同人，先號啕而后笑。大師克相遇。","上九：同人于郊，無悔。"],"tuan_ci":"同人，柔得位得中，而應乎乾，曰同人。同人曰，同人于野，亨。利涉大川，乾行也。文明以健，中正而應，君子正也。唯君子為能通天下之志。","da_xiang_ci":"天與火，同人；君子以類族辨物。"},
  "101111":{"id":14,"name_cn":"大有","full_name":"火天大有","gua_ci":"大有：元亨。","yao_ci":["初九：无交害，匪咎，艱則无咎。","九二：大車以載，有攸往，无咎。","九三：公用亨于天子，小人弗克。","九四：匪其彭，无咎。","六五：厥孚交如，威如；吉。","上九：自天佑之，吉无不利。"],"tuan_ci":"大有，柔得尊位，大中而上下應之，曰大有。其德剛健而文明，應乎天而時行，是以元亨。","da_xiang_ci":"火在天上，大有；君子以遏惡揚善，順天休命。"},
  "000001":{"id":15,"name_cn":"謙","full_name":"地山谦","gua_ci":"謙：亨，君子有終。","yao_ci":["初六：謙謙君子，用涉大川，吉。","六二：鳴謙，貞吉。","九三：勞謙君子，有終吉。","六四：无不利，撝謙。","六五：不富，以其鄰，利用侵伐，无不利。","上六：鳴謙，利用行師，征邑國。"],"tuan_ci":"謙，亨，天道下濟而光明，地道卑而上行。天道虧盈而益謙，地道變盈而流謙，鬼神害盈而福謙，人道惡盈而好謙。謙尊而光，卑而不可逾，君子之終也。","da_xiang_ci":"地中有山，謙；君子以裒多益寡，稱物平施。"},
  "100000":{"id":16,"name_cn":"豫","full_name":"雷地豫","gua_ci":"豫：利建侯行師。","yao_ci":["初六：鳴豫，凶。","六二：介于石，不終日，貞吉。","六三：盱豫，悔。遲有悔。","九四：由豫，大有得。勿疑。朋盍簪。","六五：貞疾，恆不死。","上六：冥豫，成有渝，无咎。"],"tuan_ci":"豫，剛應而志行，順以動，豫。豫，順以動，故天地如之，而況建侯行師乎？天地以順動，故日月不過，而四時不忒；聖人以順動，則刑罰清而民服。豫之時義大矣哉！","da_xiang_ci":"雷出地奮，豫。先王以作樂崇德，殷薦之上帝，以配祖考。"},
  "011100":{"id":17,"name_cn":"隨","full_name":"泽雷随","gua_ci":"隨：元亨。利貞。无咎。","yao_ci":["初九：官有渝，貞吉。出門交有功。","六二：系小子，失丈夫。","六三：系丈夫，失小子。隨，有求得利，居貞。","九四：隨有獲，貞凶。有孚在道，以明，何咎。","九五：孚于嘉，吉。","上六：拘系之，乃從維之。王用亨于西山。"],"tuan_ci":"隨，剛來而下柔，動而說，隨。大亨貞，无咎，而天下隨時，隨之時義大矣哉！","da_xiang_ci":"澤中有雷，隨；君子以嚮晦入宴息。"},
  "001110":{"id":18,"name_cn":"蠱","full_name":"山风蛊","gua_ci":"蠱：元亨。利涉大川。先甲三日，後甲三日。","yao_ci":["初六：幹父之蠱，有子考，无咎，厲終吉。","九二：幹母之蠱，不可貞。","九三：幹父之蠱，小有悔，无大咎。","六四：裕父之蠱，往見吝。","六五：幹父之蠱，用譽。","上九：不事王侯，高尚其事。"],"tuan_ci":"蠱，剛上而柔下，巽而止，蠱。蠱，元亨，而天下治也。利涉大川，往有事也。先甲三日，後甲三日，終則有始，天行也。","da_xiang_ci":"山下有風，蠱；君子以振民育德。"},
  "000011":{"id":19,"name_cn":"臨","full_name":"地泽临","gua_ci":"臨：元亨。利貞。至于八月有凶。","yao_ci":["初九：咸臨，貞吉。","九二：咸臨，吉无不利。","六三：甘臨，无攸利。既憂之，无咎。","六四：至臨，无咎。","六五：知臨，大君之宜，吉。","上六：敦臨，吉无咎。"],"tuan_ci":"臨，剛浸而長。說而順，剛中而應，大亨以正，天之道也。至于八月有凶，消不久也。","da_xiang_ci":"澤上有地，臨；君子以教思无窮，容保民无疆。"},
  "110000":{"id":20,"name_cn":"觀","full_name":"风地观","gua_ci":"觀：盥而不荐，有孚顒若。","yao_ci":["初六：童觀，小人无咎，君子吝。","六二：窺觀，利女貞。","六三：觀我生，進退。","六四：觀國之光，利用賓于王。","九五：觀我生，君子无咎。","上九：觀其生，君子无咎。"],"tuan_ci":"大觀在上，順而巽，中正以觀天下。觀，盥而不荐，有孚顒若，下觀而化也。觀天之神道，而四時不忒，聖人以神道設教，而天下服矣。","da_xiang_ci":"風行地上，觀；先王以省方，觀民設教。"},
  "101100":{"id":21,"name_cn":"噬嗑","full_name":"火雷噬嗑","gua_ci":"噬嗑：亨。利用獄。","yao_ci":["初九：屨校滅趾，无咎。","六二：噬膚滅鼻，无咎。","六三：噬臘肉，遇毒；小吝，无咎。","九四：噬乾胏，得金矢，利艱貞，吉。","六五：噬乾肉，得黃金，貞厲，无咎。","上九：何校滅耳，凶。"],"tuan_ci":"頤中有物，曰噬嗑，噬嗑而亨。剛柔分，動而明，雷電合而章。柔得中而上行，雖不當位，利用獄也。","da_xiang_ci":"雷電噬嗑；先王以明罰敕法。"},
  "001101":{"id":22,"name_cn":"賁","full_name":"山火贲","gua_ci":"賁：亨。小利有攸往。","yao_ci":["初九：賁其趾，舍車而徒。","六二：賁其須。","九三：賁如濡如，永貞吉。","六四：賁如皤如，白馬翰如，匪寇婚媾。","六五：賁於丘園，束帛戔戔，吝，終吉。","上九：白賁，无咎。"],"tuan_ci":"賁，亨；柔來而文剛，故亨。分剛上而文柔，故小利有攸往。剛柔交錯，天文也；文明以止，人文也。觀乎天文，以察時變；觀乎人文，以化成天下。","da_xiang_ci":"山下有火，賁；君子以明庶政，无敢折獄。"},
  "001000":{"id":23,"name_cn":"剝","full_name":"山地剥","gua_ci":"剝：不利。有攸往。","yao_ci":["初六：剝牀以足，蔑貞凶。","六二：剝牀以辨，蔑貞凶。","六三：剝之，无咎。","六四：剝牀以膚，凶。","六五：貫魚，以宮人寵，无不利。","上九：碩果不食，君子得輿，小人剝廬。"],"tuan_ci":"剝，剝也，柔變剛也。不利有攸往，小人長也。順而止之，觀象也。君子尚消息盈虛，天行也。","da_xiang_ci":"山附地上，剝；上以厚下，安宅。"},
  "000100":{"id":24,"name_cn":"復","full_name":"地雷复","gua_ci":"復：亨。出入无疾，朋來无咎。反復其道，七日來復，利有攸往。","yao_ci":["初九：不復遠，无袛悔，元吉。","六二：休復，吉。","六三：頻復，厲无咎。","六四：中行獨復。","六五：敦復，无悔。","上六：迷復，凶，有災眚。用行師，終有大敗，以其國君，凶；至于十年，不克征。"],"tuan_ci":"復亨；剛反，動而以順行，是以出入无疾，朋來无咎。反復其道，七日來復，天行也。利有攸往，剛長也。復其見天地之心乎？","da_xiang_ci":"雷在地中，復；先王以至日閉關，商旅不行，后不省方。"},
  "111100":{"id":25,"name_cn":"无妄","full_name":"天雷无妄","gua_ci":"无妄：元亨。利貞。其匪正有眚，不利有攸往。","yao_ci":["初九：无妄，往吉。","六二：不耕穫，不菑畬，則利有攸往。","六三：无妄之災，或系之牛，行人之得，邑人之災。","九四：可貞，无咎。","九五：无妄之疾，勿藥有喜。","上九：无妄，行有眚，无攸利。"],"tuan_ci":"无妄，剛自外來，而為主於內。動而健，剛中而應，大亨以正，天之命也。其匪正有眚，不利有攸往。无妄之往，何之矣？天命不佑，行矣哉？","da_xiang_ci":"天下雷行，物與无妄；先王以茂對時，育萬物。"},
  "001111":{"id":26,"name_cn":"大畜","full_name":"山天大畜","gua_ci":"大畜：利貞，不家食吉，利涉大川。","yao_ci":["初九：有厲利已。","九二：輿說輹。","九三：良馬逐，利艱貞。曰閑輿衛，利有攸往。","六四：童牛之牿，元吉。","六五：豶豕之牙，吉。","上九：何天之衢，亨。"],"tuan_ci":"大畜，剛健篤實輝光，日新其德，剛上而尚賢。能止健，大正也。不家食吉，養賢也。利涉大川，應乎天也。","da_xiang_ci":"天在山中，大畜；君子以多識前言往行，以畜其德。"},
  "100001":{"id":27,"name_cn":"頤","full_name":"山雷颐","gua_ci":"頤：貞吉。觀頤，自求口實。","yao_ci":["初九：舍爾靈龜，觀我朵頤，凶。","六二：顛頤，拂經，于丘頤，征凶。","六三：拂頤，貞凶，十年勿用，无攸利。","六四：顛頤吉，虎視眈眈，其欲逐逐，无咎。","六五：拂經，居貞吉，不可涉大川。","上九：由頤，厲吉，利涉大川。"],"tuan_ci":"頤貞吉，養正則吉也。觀頤，觀其所養也；自求口實，觀其自養也。天地養萬物，聖人養賢，以及萬民；頤之時義大矣哉！","da_xiang_ci":"山下有雷，頤；君子以慎言語，節飲食。"},
  "011110":{"id":28,"name_cn":"大過","full_name":"泽风大过","gua_ci":"大過：棟橈，利有攸往，亨。","yao_ci":["初六：藉用白茅，无咎。","九二：枯楊生稊，老夫得其女妻，无不利。","九三：棟橈，凶。","九四：棟隆，吉。有它吝。","九五：枯楊生華，老婦得其士夫，无咎无譽。","上六：過涉滅頂，凶，无咎。"],"tuan_ci":"大過，大者過也。棟橈，本末弱也。剛過而中，巽而說行，利有攸往，乃亨。大過之時義大矣哉！","da_xiang_ci":"澤滅木，大過。君子以獨立不懼，遯世无悶。"},
  "010010":{"id":29,"name_cn":"坎","full_name":"坎为水","gua_ci":"習坎：有孚，維心亨。行有尚。","yao_ci":["初六：習坎，入于坎窞，凶。","九二：坎有險，求小得。","六三：來之坎坎，險且枕，入于坎窞，勿用。","六四：樽酒簋貳，用缶，納約自牖，終无咎。","九五：坎不盈，祗既平，无咎。","上六：係用徽纆，寘于叢棘，三歲不得，凶。"],"tuan_ci":"習坎，重險也。水流而不盈，行險而不失其信。維心亨，乃以剛中也。行有尚，往有功也。天險不可升也，地險山川丘陵也，王公設險以守其國，坎之時用大矣哉！","da_xiang_ci":"水洊至，習坎；君子以常德行，習教事。"},
  "101101":{"id":30,"name_cn":"離","full_name":"离为火","gua_ci":"離：利貞。亨。畜牝牛，吉。","yao_ci":["初九：履錯然，敬之无咎。","六二：黃離，元吉。","九三：日昃之離，不鼓缶而歌，則大耋之嗟，凶。","九四：突如其來如，焚如，死如，棄如。","六五：出涕沱若，戚嗟若，吉。","上九：王用出征，有嘉折首，獲匪其醜，无咎。"],"tuan_ci":"離，麗也；日月麗乎天，百谷草木麗乎土，重明以麗乎正，乃化成天下。柔麗乎中正，故亨；是以畜牝牛吉也。","da_xiang_ci":"明兩作離，大人以繼明照于四方。"},
  "011001":{"id":31,"name_cn":"咸","full_name":"泽山咸","gua_ci":"咸：亨。利貞。取女吉。","yao_ci":["初六：咸其拇。","六二：咸其腓，凶，居吉。","九三：咸其股，執其隨，往吝。","九四：貞吉悔亡，憧憧往來，朋從爾思。","九五：咸其脢，无悔。","上六：咸其輔，頰，舌。"],"tuan_ci":"咸，感也。柔上而剛下，二氣感應以相與，止而說，男下女，是以亨利貞，取女吉也。天地感而萬物化生，聖人感人心而天下和平；觀其所感，而天地萬物之情可見矣！","da_xiang_ci":"山上有澤，咸；君子以虛受人。"},
  "100110":{"id":32,"name_cn":"恆","full_name":"雷风恒","gua_ci":"恆：亨，无咎。利貞，利有攸往。","yao_ci":["初六：浚恆，貞凶，无攸利。","九二：悔亡。","九三：不恆其德，或承之羞，貞吝。","九四：田无禽。","六五：恆其德，貞，婦人吉，夫子凶。","上六：振恆，凶。"],"tuan_ci":"恆，久也。剛上而柔下，雷風相與，巽而動，剛柔皆應，恆。恆亨无咎，利貞；久于其道也，天地之道，恆久而不已也。利有攸往，終則有始也。日月得天，而能久照，四時變化，而能久成，聖人久于其道，而天下化成；觀其所恆，而天地萬物之情可見矣！","da_xiang_ci":"雷風，恆；君子以立不易方。"},
  "111001":{"id":33,"name_cn":"遯","full_name":"天山遁","gua_ci":"遯：亨。小利貞。","yao_ci":["初六：遯尾，厲，勿用有攸往。","六二：執之用黃牛之革，莫之勝說。","九三：系遯，有疾厲，畜臣妾吉。","九四：好遯君子吉，小人否。","九五：嘉遯，貞吉。","上九：肥遯，无不利。"],"tuan_ci":"遯亨，遯而亨也。剛當位而應，與時行也。小利貞，浸而長也。遯之時義大矣哉！","da_xiang_ci":"天下有山，遯；君子以遠小人，不惡而嚴。"},
  "100111":{"id":34,"name_cn":"大壯","full_name":"雷天大壮","gua_ci":"大壯：利貞。","yao_ci":["初九：壯于趾，征凶，有孚。","九二：貞吉。","九三：小人用壯，君子用罔，貞厲。羝羊觸藩，羸其角。","九四：貞吉悔亡，藩決不羸，壯于大輿之輹。","六五：喪羊于易，无悔。","上六：羝羊觸藩，不能退，不能遂，无攸利，艱則吉。"],"tuan_ci":"大壯，大者壯也。剛以動，故壯。大壯利貞；大者正也。正大而天地之情可見矣！","da_xiang_ci":"雷在天上，大壯；君子以非禮弗履。"},
  "101000":{"id":35,"name_cn":"晉","full_name":"火地晋","gua_ci":"晉：康侯用錫馬蕃庶，晝日三接。","yao_ci":["初六：晉如，摧如，貞吉。罔孚，裕无咎。","六二：晉如，愁如，貞吉。受茲介福，于其王母。","六三：眾允，悔亡。","九四：晉如鼫鼠，貞厲。","六五：悔亡，失得勿恤，往吉无不利。","上九：晉其角，維用伐邑，厲吉无咎，貞吝。"],"tuan_ci":"晉，進也。明出地上，順而麗乎大明，柔進而上行。是以康侯用錫馬蕃庶，晝日三接也。","da_xiang_ci":"明出地上，晉；君子以自昭明德。"},
  "000101":{"id":36,"name_cn":"明夷","full_name":"地火明夷","gua_ci":"明夷：利艱貞。","yao_ci":["初九：明夷于飛，垂其翼。君子于行，三日不食，有攸往，主人有言。","六二：明夷，夷于左股，用拯馬壯，吉。","九三：明夷于南狩，得其大首，不可疾貞。","六四：入于左腹，獲明夷之心，于出門庭。","六五：箕子之明夷，利貞。","上六：不明晦，初登于天，后入于地。"],"tuan_ci":"明入地中，明夷。內文明而外柔順，以蒙大難，文王以之。利艱貞，晦其明也，內難而能正其志，箕子以之。","da_xiang_ci":"明入地中，明夷；君子以蒞眾，用晦而明。"},
  "110101":{"id":37,"name_cn":"家人","full_name":"风火家人","gua_ci":"家人：利女貞。","yao_ci":["初九：閑有家，悔亡。","六二：无攸遂，在中饋，貞吉。","九三：家人嗃嗃，悔厲吉；婦子嘻嘻，終吝。","六四：富家，大吉。","九五：王假有家，勿恤。吉。","上九：有孚威如，終吉。"],"tuan_ci":"家人，女正位乎內，男正位乎外，男女正，天地之大義也。家人有嚴君焉，父母之謂也。父父，子子，兄兄，弟弟，夫夫，婦婦，而家道正；正家而天下定矣。","da_xiang_ci":"風自火出，家人；君子以言有物，而行有恆。"},
  "101011":{"id":38,"name_cn":"睽","full_name":"火泽睽","gua_ci":"睽：小事吉。","yao_ci":["初九：悔亡，喪馬勿逐，自復；見惡人无咎。","九二：遇主于巷，无咎。","六三：見輿曳，其牛掣，其人天且劓，无初有終。","九四：睽孤，遇元夫，交孚，厲无咎。","六五：悔亡，厥宗噬膚，往何咎。","上九：睽孤，見豕負涂，載鬼一車，先張之弧，后說之弧，匪寇婚媾，往遇雨則吉。"],"tuan_ci":"睽，火動而上，澤動而下；二女同居，其志不同行；說而麗乎明，柔進而上行，得中而應乎剛；是以小事吉。天地睽，而其事同也；男女睽，而其志通也；萬物睽，而其事類也；睽之時用大矣哉！","da_xiang_ci":"上火下澤，睽；君子以同而異。"},
  "001010":{"id":39,"name_cn":"蹇","full_name":"水山蹇","gua_ci":"蹇：利西南，不利東北；利見大人，貞吉。","yao_ci":["初六：往蹇，來譽。","六二：王臣蹇蹇，匪躬之故。","九三：往蹇來反。","六四：往蹇來連。","九五：大蹇朋來。","上六：往蹇來碩，吉；利見大人。"],"tuan_ci":"蹇，難也，險在前也。見險而能止，知矣哉！蹇利西南，往得中也；不利東北，其道窮也。利見大人，往有功也。當位貞吉，以正邦也。蹇之時用大矣哉！","da_xiang_ci":"山上有水，蹇；君子以反身修德。"},
  "010100":{"id":40,"name_cn":"解","full_name":"雷水解","gua_ci":"解：利西南，无所往，其來復吉。有攸往，夙吉。","yao_ci":["初六：无咎。","九二：田獲三狐，得黃矢，貞吉。","六三：負且乘，致寇至，貞吝。","九四：解而拇，朋至斯孚。","六五：君子維有解，吉；有孚于小人。","上六：公用射隼，于高墉之上，獲之，无不利。"],"tuan_ci":"解，險以動，動而免乎險，解。解利西南，往得眾也。其來復吉，乃得中也。有攸往夙吉，往有功也。天地解，而雷雨作，雷雨作，而百果草木皆甲坼，解之時義大矣哉！","da_xiang_ci":"雷雨作，解；君子以赦過宥罪。"},
  "001011":{"id":41,"name_cn":"損","full_name":"山泽损","gua_ci":"損：有孚，元吉。无咎，可貞，利有攸往。曷之用？二簋可用享。","yao_ci":["初九：已事遄往，无咎，酌損之。","九二：利貞，征凶，弗損益之。","六三：三人行，則損一人；一人行，則得其友。","六四：損其疾，使遄有喜，无咎。","六五：或益之，十朋之龜弗克違，元吉。","上九：弗損益之，无咎，貞吉，利有攸往，得臣无家。"],"tuan_ci":"損，損下益上，其道上行。損而有孚，元吉，无咎，可貞，利有攸往。曷之用？二簋可用享；二簋應有時。損剛益柔有時，損益盈虛，與時偕行。","da_xiang_ci":"山下有澤，損；君子以懲忿窒欲。"},
  "110100":{"id":42,"name_cn":"益","full_name":"风雷益","gua_ci":"益：利有攸往。利涉大川。","yao_ci":["初九：利用為大作，元吉，无咎。","六二：或益之，十朋之龜弗克違，永貞吉。王用享于帝，吉。","六三：益之用凶事，无咎。有孚中行，告公用圭。","六四：中行，告公從。利用為依遷國。","九五：有孚惠心，勿問元吉。有孚惠我德。","上九：莫益之，或擊之，立心勿恆，凶。"],"tuan_ci":"益，損上益下，民說无疆，自上下下，其道大光。利有攸往，中正有慶。利涉大川，木道乃行。益動而巽，日進无疆。天施地生，其益无方。凡益之道，與時偕行。","da_xiang_ci":"風雷，益；君子以見善則遷，有過則改。"},
  "011111":{"id":43,"name_cn":"夬","full_name":"泽天夬","gua_ci":"夬：揚于王庭，孚號，有厲，告自邑，不利即戎，利有攸往。","yao_ci":["初九：壯于前趾，往不勝為咎。","九二：惕號，莫夜有戎，勿恤。","九三：壯于頄，有凶。君子夬夬，獨行遇雨，若濡有慍，无咎。","九四：臀无膚，其行次且。牽羊悔亡，聞言不信。","九五：莧陸夬夬，中行无咎。","上六：无號，終有凶。"],"tuan_ci":"夬，決也，剛決柔也。健而說，決而和，揚于王庭，柔乘五剛也。孚號有厲，其危乃光也。告自邑，不利即戎，所尚乃窮也。利有攸往，剛長乃終也。","da_xiang_ci":"澤上于天，夬；君子以施祿及下，居德則忌。"},
  "111110":{"id":44,"name_cn":"姤","full_name":"天风姤","gua_ci":"姤：女壯，勿用取女。","yao_ci":["初六：系于金柅，貞吉，有攸往，見凶，羸豕孚踟躅。","九二：包有魚，无咎，不利賓。","九三：臀无膚，其行次且，厲，无大咎。","九四：包无魚，起凶。","九五：以杞包瓜，含章，有隕自天。","上九：姤其角，吝，无咎。"],"tuan_ci":"姤，遇也，柔遇剛也。勿用取女，不可與長也。天地相遇，品物咸章也。剛遇中正，天下大行也。姤之時義大矣哉！","da_xiang_ci":"天下有風，姤；后以施命誥四方。"},
  "011000":{"id":45,"name_cn":"萃","full_name":"泽地萃","gua_ci":"萃：亨。王假有廟，利見大人，亨。利貞。用大牲吉，利有攸往。","yao_ci":["初六：有孚不終，乃亂乃萃，若號一握為笑，勿恤，往无咎。","六二：引吉，无咎，孚乃利用禴。","六三：萃如，嗟如，无攸利，往无咎，小吝。","九四：大吉，无咎。","九五：萃有位，无咎。匪孚，元永貞，悔亡。","上六：齎咨涕洟，无咎。"],"tuan_ci":"萃，聚也；順以說，剛中而應，故聚也。王假有廟，致孝享也。利見大人亨，聚以正也。用大牲吉，利有攸往，順天命也。觀其所聚，而天地萬物之情可見矣。","da_xiang_ci":"澤上于地，萃；君子以除戎器，戒不虞。"},
  "000110":{"id":46,"name_cn":"升","full_name":"地风升","gua_ci":"升：元亨，用見大人，勿恤，南征吉。","yao_ci":["初六：允升，大吉。","九二：孚乃利用禴，无咎。","九三：升虛邑。","六四：王用亨于岐山，吉无咎。","六五：貞吉，升階。","上六：冥升，利于不息之貞。"],"tuan_ci":"柔以時升，巽而順，剛中而應，是以大亨。用見大人，勿恤；有慶也。南征吉，志行也。","da_xiang_ci":"地中生木，升；君子以順德，積小以高大。"},
  "011010":{"id":47,"name_cn":"困","full_name":"泽水困","gua_ci":"困：亨，貞大人吉，无咎，有言不信。","yao_ci":["初六：臀困于株木，入于幽谷，三歲不覿。","九二：困于酒食，朱紱方來，利用亨祀，征凶，无咎。","六三：困于石，據于蒺藜，入于其宮，不見其妻，凶。","九四：來徐徐，困于金車，吝，有終。","九五：劓刖，困于赤紱，乃徐有說，利用祭祀。","上六：困于葛藟，于臲卼，曰動悔。有悔，征吉。"],"tuan_ci":"困，剛掩也。險以說，困而不失其所，亨；其唯君子乎？貞大人吉，以剛中也。有言不信，尚口乃窮也。","da_xiang_ci":"澤无水，困；君子以致命遂志。"},
  "010110":{"id":48,"name_cn":"井","full_name":"水风井","gua_ci":"井：改邑不改井，无喪无得，往來井井。汔至亦未繘井。羸其瓶，凶。","yao_ci":["初六：井泥不食，舊井无禽。","九二：井谷射鮒，瓮敝漏。","九三：井渫不食，為我心惻，可用汲，王明，并受其福。","六四：井甃，无咎。","九五：井冽，寒泉食。","上六：井收勿幕，有孚元吉。"],"tuan_ci":"巽乎水而上水，井；井養而不窮也。改邑不改井，乃以剛中也。汔至亦未繘井，未有功也。羸其瓶，是以凶也。","da_xiang_ci":"木上有水，井；君子以勞民勸相。"},
  "011101":{"id":49,"name_cn":"革","full_name":"泽火革","gua_ci":"革：己日乃孚，元亨。利貞。悔亡。","yao_ci":["初九：鞏用黃牛之革。","六二：己日乃革之，征吉，无咎。","九三：征凶，貞厲，革言三就，有孚。","九四：悔亡，有孚改命，吉。","九五：大人虎變，未占有孚。","上六：君子豹變，小人革面，征凶，居貞吉。"],"tuan_ci":"革，水火相息，二女同居，其志不相得，曰革。已日乃孚；革而信也。文明以說，大亨以正，革而當，其悔乃亡。天地革而四時成，湯武革命，順乎天而應乎人，革之時義大矣哉！","da_xiang_ci":"澤中有火，革；君子以治歷明時。"},
  "101110":{"id":50,"name_cn":"鼎","full_name":"火风鼎","gua_ci":"鼎：元吉，亨。","yao_ci":["初六：鼎顛趾，利出否，得妾以其子，无咎。","九二：鼎有實，我仇有疾，不我能即，吉。","九三：鼎耳革，其行塞，雉膏不食，方雨虧悔，終吉。","九四：鼎折足，覆公餗，其形渥，凶。","六五：鼎黃耳金鉉，利貞。","上九：鼎玉鉉，大吉，无不利。"],"tuan_ci":"鼎，象也。以木巽火，亨飪也。聖人亨以享上帝，而大亨以養聖賢。巽而耳目聰明，柔進而上行，得中而應乎剛，是以元亨。","da_xiang_ci":"木上有火，鼎；君子以正位凝命。"},
  "100100":{"id":51,"name_cn":"震","full_name":"震为雷","gua_ci":"震：亨。震來虩虩，笑言啞啞。震驚百里，不喪匕鬯。","yao_ci":["初九：震來虩虩，后笑言啞啞，吉。","六二：震來厲，億喪貝，躋于九陵，勿逐，七日得。","六三：震蘇蘇，震行无眚。","九四：震遂泥。","六五：震往來厲，億无喪，有事。","上六：震索索，視矍矍，征凶。震不于其躬，于其鄰，无咎。婚媾有言。"],"tuan_ci":"震，亨。震來虩虩，恐致福也。笑言啞啞，后有則也。震驚百里，驚遠而懼邇也。出可以守宗廟社稷，以為祭主也。","da_xiang_ci":"洊雷，震；君子以恐懼修省。"},
  "001001":{"id":52,"name_cn":"艮","full_name":"艮为山","gua_ci":"艮：艮其背，不獲其身，行其庭，不見其人，无咎。","yao_ci":["初六：艮其趾，无咎，利永貞。","六二：艮其腓，不拯其隨，其心不快。","九三：艮其限，列其夤，厲薰心。","六四：艮其身，无咎。","六五：艮其輔，言有序，悔亡。","上九：敦艮，吉。"],"tuan_ci":"艮，止也。時止則止，時行則行，動靜不失其時，其道光明。艮其止，止其所也。上下敵應，不相與也。是以不獲其身，行其庭不見其人，无咎也。","da_xiang_ci":"兼山，艮；君子以思不出其位。"},
  "110001":{"id":53,"name_cn":"漸","full_name":"风山渐","gua_ci":"漸：女歸吉，利貞。","yao_ci":["初六：鴻漸于干，小子厲，有言，无咎。","六二：鴻漸于磐，飲食衎衎，吉。","九三：鴻漸于陸，夫征不復，婦孕不育，凶；利御寇。","六四：鴻漸于木，或得其桷，无咎。","九五：鴻漸于陵，婦三歲不孕，終莫之勝，吉。","上九：鴻漸于陸，其羽可用為儀，吉。"],"tuan_ci":"漸之進也，女歸吉也。進得位，往有功也。進以正，可以正邦也。其位剛，得中也。止而巽，動不窮也。","da_xiang_ci":"山上有木，漸；君子以居賢德，善俗。"},
  "100011":{"id":54,"name_cn":"歸妹","full_name":"雷泽归妹","gua_ci":"歸妹：征凶，无攸利。","yao_ci":["初九：歸妹以娣，跛能履，征吉。","九二：眇能視，利幽人之貞。","六三：歸妹以須，反歸以娣。","九四：歸妹愆期，遲歸有時。","六五：帝乙歸妹，其君之袂，不如其娣之袂良，月幾望，吉。","上六：女承筐无實，士刲羊无血，无攸利。"],"tuan_ci":"歸妹，天地之大義也。天地不交，而萬物不興，歸妹人之終始也。說以動，所歸妹也。征凶，位不當也。无攸利，柔乘剛也。","da_xiang_ci":"澤上有雷，歸妹；君子以永終知敝。"},
  "100101":{"id":55,"name_cn":"豐","full_name":"雷火丰","gua_ci":"豐：亨。王假之，勿憂，宜日中。","yao_ci":["初九：遇其配主，雖旬无咎，往有尚。","六二：豐其蔀，日中見斗，往得疑疾，有孚發若，吉。","九三：豐其沛，日中見昧，折其右肱，无咎。","九四：豐其蔀，日中見斗，遇其夷主，吉。","六五：來章，有慶譽，吉。","上六：豐其屋，蔀其家，窺其戶，闃其無人，三歲不覿，凶。"],"tuan_ci":"豐，大也。明以動，故豐。王假之，尚大也。勿憂宜日中，宜照天下也。日中則昃，月盈則食，天地盈虛，與時消息，而況於人乎？況於鬼神乎？","da_xiang_ci":"雷電皆至，豐；君子以折獄致刑。"},
  "101001":{"id":56,"name_cn":"旅","full_name":"火山旅","gua_ci":"旅：小亨，旅貞吉。","yao_ci":["初六：旅瑣瑣，斯其所取災。","六二：旅即次，懷其資，得童僕貞。","九三：旅焚其次，喪其童僕，貞厲。","九四：旅于處，得其資斧，我心不快。","六五：射雉一矢亡，終以譽命。","上九：鳥焚其巢，旅人先笑後號啕。喪牛于易，凶。"],"tuan_ci":"旅，小亨，柔得中乎外，而順乎剛，止而麗乎明，是以小亨，旅貞吉也。旅之時義大矣哉！","da_xiang_ci":"山上有火，旅；君子以明慎用刑，而不留獄。"},
  "110110":{"id":57,"name_cn":"巽","full_name":"巽为风","gua_ci":"巽：小亨。利有攸往。利見大人。","yao_ci":["初六：進退，利武人之貞。","九二：巽在牀下，用史巫紛若，吉无咎。","九三：頻巽，吝。","六四：悔亡，田獲三品。","九五：貞吉悔亡，无不利。无初有終，先庚三日，後庚三日，吉。","上九：巽在牀下，喪其資斧，貞凶。"],"tuan_ci":"重巽以申命，剛巽乎中正而志行。柔皆順乎剛，是以小亨，利有攸往，利見大人。","da_xiang_ci":"隨風，巽；君子以申命行事。"},
  "011011":{"id":58,"name_cn":"兌","full_name":"兑为泽","gua_ci":"兌：亨。利貞。","yao_ci":["初九：和兌，吉。","九二：孚兌，吉，悔亡。","六三：來兌，凶。","九四：商兌，未寧，介疾有喜。","九五：孚于剝，有厲。","上六：引兌。"],"tuan_ci":"兌，說也。剛中而柔外，說以利貞，是以順乎天，而應乎人。說以先民，民忘其勞；說以犯難，民忘其死；說之大，民勸矣哉！","da_xiang_ci":"麗澤，兌；君子以朋友講習。"},
  "110010":{"id":59,"name_cn":"渙","full_name":"风水涣","gua_ci":"渙：亨。王假有廟，利涉大川，利貞。","yao_ci":["初六：用拯馬壯，吉。","九二：渙奔其机，悔亡。","六三：渙其躬，无悔。","六四：渙其群，元吉。渙有丘，匪夷所思。","九五：渙汗其大號，渙王居，无咎。","上九：渙其血，去逖出，无咎。"],"tuan_ci":"渙，亨。剛來而不窮，柔得位乎外而上同。王假有廟，王乃在中也。利涉大川，乘木有功也。","da_xiang_ci":"風行水上，渙；先王以享于帝立廟。"},
  "010011":{"id":60,"name_cn":"節","full_name":"水泽节","gua_ci":"節：亨。苦節不可貞。","yao_ci":["初九：不出戶庭，无咎。","九二：不出門庭，凶。","六三：不節若，則嗟若，无咎。","六四：安節，亨。","九五：甘節，吉；往有尚。","上六：苦節，貞凶，悔亡。"],"tuan_ci":"節，亨，剛柔分，而剛得中。苦節不可貞，其道窮也。說以行險，當位以節，中正以通。天地節而四時成，節以制度，不傷財，不害民。","da_xiang_ci":"澤上有水，節；君子以制數度，議德行。"},
  "110011":{"id":61,"name_cn":"中孚","full_name":"风泽中孚","gua_ci":"中孚：豚魚吉，利涉大川，利貞。","yao_ci":["初九：虞吉，有他不燕。","九二：鳴鶴在陰，其子和之，我有好爵，吾與爾靡之。","六三：得敵，或鼓或罷，或泣或歌。","六四：月几望，馬匹亡，无咎。","九五：有孚攣如，无咎。","上九：翰音登于天，貞凶。"],"tuan_ci":"中孚，柔在內而剛得中。說而巽，孚，乃化邦也。豚魚吉，信及豚魚也。利涉大川，乘木舟虛也。中孚以利貞，乃應乎天也。","da_xiang_ci":"澤上有風，中孚；君子以議獄緩死。"},
  "001100":{"id":62,"name_cn":"小過","full_name":"雷山小过","gua_ci":"小過：亨。利貞。可小事，不可大事。飛鳥遺之音，不宜上宜下，大吉。","yao_ci":["初六：飛鳥以凶。","六二：過其祖，遇其妣；不及其君，遇其臣；无咎。","九三：弗過防之，從或戕之，凶。","九四：无咎，弗過遇之。往厲必戒，勿用永貞。","六五：密雲不雨，自我西郊，公弋取彼在穴。","上六：弗遇過之，飛鳥離之，凶，是謂災眚。"],"tuan_ci":"小過，小者過而亨也。過以利貞，與時行也。柔得中，是以小事吉也。剛失位而不中，是以不可大事也。有飛鳥之象焉，有飛鳥遺之音，不宜上宜下，大吉；上逆而下順也。","da_xiang_ci":"山上有雷，小過；君子以行過乎恭，喪過乎哀，用過乎儉。"},
  "010101":{"id":63,"name_cn":"既濟","full_name":"水火既济","gua_ci":"既濟：亨。小利貞。初吉終亂。","yao_ci":["初九：曳其輪，濡其尾，无咎。","六二：婦喪其茀，勿逐，七日得。","九三：高宗伐鬼方，三年克之，小人勿用。","六四：繻有衣袽，終日戒。","九五：東鄰殺牛，不如西鄰之禴祭，實受其福。","上六：濡其首，厲。"],"tuan_ci":"既濟，亨，小者亨也。利貞，剛柔正而位當也。初吉，柔得中也。終止則亂，其道窮也。","da_xiang_ci":"水在火上，既濟；君子以思患而預防之。"},
  "101010":{"id":64,"name_cn":"未濟","full_name":"火水未济","gua_ci":"未濟：亨。小狐汔濟，濡其尾，无攸利。","yao_ci":["初六：濡其尾，吝。","九二：曳其輪，貞吉。","六三：未濟，征凶，利涉大川。","九四：貞吉，悔亡，震用伐鬼方，三年有賞于大國。","六五：貞吉，无悔，君子之光，有孚，吉。","上九：有孚于飲酒，无咎，濡其首，有孚失是。"],"tuan_ci":"未濟，亨；柔得中也。小狐汔濟，未出中也。濡其尾，无攸利；不續終也。雖不當位，剛柔應也。","da_xiang_ci":"火在水上，未濟；君子以慎辨物居方。"}
};

Object.values(HEXAGRAMS).forEach(g => {
  g.unicode = String.fromCodePoint(0x4DC0 + g.id - 1);
});

/* ================================================================
   HEXAGRAM ENGINE
   ================================================================ */
const LINE_NUM = ['一','二','三','四','五','六'];
const LINE_NAMES = ['初爻','二爻','三爻','四爻','五爻','上爻'];

function getCoinResult(coinStates) {
  const heads = coinStates.filter(s => s === 'heads').length;
  if (heads === 3) return { value: 9, name: '老阳', line: 'yang', changing: true, symbol: '⚊○', heads: 3, tails: 0 };
  if (heads === 2) return { value: 7, name: '少阳', line: 'yang', changing: false, symbol: '⚊', heads: 2, tails: 1 };
  if (heads === 1) return { value: 8, name: '少阴', line: 'yin', changing: false, symbol: '⚋', heads: 1, tails: 2 };
  return { value: 6, name: '老阴', line: 'yin', changing: true, symbol: '⚋×', heads: 0, tails: 3 };
}

function buildBinary(lines) {
  return lines.map(r => (r.line === 'yang' ? '1' : '0')).join('');
}

function transformBinary(binary, lines) {
  return binary.split('').map((bit, i) => (lines[i].changing ? (bit === '1' ? '0' : '1') : bit)).join('');
}

function getHexagram(binary) { return HEXAGRAMS[binary] || null; }

/* ================================================================
   APP STATE
   ================================================================ */
const state = {
  screen: 'welcome', question: '',
  currentLine: 0, coinStates: ['heads', 'heads', 'heads'], lines: [],
};

/* ================================================================
   INSTANCES
   ================================================================ */
const audio = new AudioEngine();
const haptic = new HapticEngine();

/* ================================================================
   DOM REFS
   ================================================================ */
const $ = id => document.getElementById(id);
const screenWelcome = $('screen-welcome');
const screenCasting = $('screen-casting');
const screenResult = $('screen-result');
const questionInput = $('questionInput');
const lineIndicator = $('lineIndicator');
const lineProgress = $('lineProgress');
const coinsRow = $('coinsRow');
const resultLabel = $('resultLabel');
const comboHint = $('comboHint');
const trail = $('trail');
const resultScroll = $('resultScroll');
const toast = $('toast');

/* ================================================================
   SCREEN MANAGEMENT
   ================================================================ */
function showScreen(name) {
  [screenWelcome, screenCasting, screenResult].forEach(s => s.classList.remove('active'));
  if (name === 'welcome') screenWelcome.classList.add('active');
  else if (name === 'casting') screenCasting.classList.add('active');
  else if (name === 'result') screenResult.classList.add('active');
  state.screen = name;
}

/* ================================================================
   TOAST
   ================================================================ */
let toastTimer;
function showToast(msg, duration = 2400) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

/* ================================================================
   COIN UI
   ================================================================ */
function renderCoins() {
  const coinEls = coinsRow.querySelectorAll('.coin');
  coinEls.forEach(el => {
    const idx = parseInt(el.dataset.coin);
    const st = state.coinStates[idx];
    el.dataset.state = st;
    el.textContent = st === 'heads' ? '正' : '反';
    el.className = 'coin ' + st;
  });
  updateLiveResult();
}

function updateLiveResult() {
  const result = getCoinResult(state.coinStates);
  resultLabel.textContent = result.symbol + ' ' + result.name;
  resultLabel.className = 'result-label' + (result.changing ? ' changing' : '');
  const heads = state.coinStates.filter(s => s === 'heads').length;
  comboHint.textContent = heads + ' 正  ·  ' + (3 - heads) + ' 反';
}

function showPlaceholder() {
  resultLabel.textContent = '掷 出 铜 钱';
  resultLabel.className = 'result-label';
  comboHint.textContent = '点击铜钱或按随机';
  // Show coins in heads state visually but don't show result
  const coinEls = coinsRow.querySelectorAll('.coin');
  coinEls.forEach(el => {
    el.dataset.state = 'heads';
    el.textContent = '正';
    el.className = 'coin heads';
  });
  // Disable confirm until user interacts — prevents accidental 老阳
  $('btnConfirm').disabled = true;
  $('btnConfirm').style.opacity = '0.4';
  $('btnConfirm').style.pointerEvents = 'none';
}

function enableConfirm() {
  $('btnConfirm').disabled = false;
  $('btnConfirm').style.opacity = '1';
  $('btnConfirm').style.pointerEvents = 'auto';
}

function getRandomBytes(n) {
  // Primary: crypto.getRandomValues (hardware entropy)
  try {
    const arr = new Uint8Array(n);
    crypto.getRandomValues(arr);
    return arr;
  } catch(e) {
    // Fallback: mix timestamp + Math.random + performance.now for entropy
    const arr = new Uint8Array(n);
    for (let i = 0; i < n; i++) {
      const mix = (Math.random() * 256) ^ ((Date.now() >> (i % 16)) & 0xFF) ^ ((performance.now() * 1000 >> (i % 8)) & 0xFF);
      arr[i] = Math.floor(Math.abs(mix)) % 256;
    }
    return arr;
  }
}

/* ================================================================
   LINE LOCKING
   ================================================================ */
function lockCurrentLine() {
  const result = getCoinResult(state.coinStates);
  state.lines.push(result);
  audio.coinToss();
  audio.coinLand();
  haptic.pulse();
}

function advanceLine() {
  state.currentLine++;
  if (state.currentLine >= 6) {
    setTimeout(() => showResult(), 500);
  } else {
    renderCastingScreen();
  }
}

/* ================================================================
   CASTING FLOW
   ================================================================ */
function startCasting() {
  state.question = questionInput.value.trim();
  state.currentLine = 0;
  state.lines = [];
  state.coinStates = ['heads', 'heads', 'heads'];
  showScreen('casting');
  renderCastingScreen();
}

function renderCastingScreen() {
  const i = state.currentLine;
  lineIndicator.textContent = '第 ' + LINE_NUM[i] + ' 爻';
  const dots = lineProgress.querySelectorAll('.progress-slot');
  dots.forEach((d, j) => {
    d.className = 'progress-slot';
    if (j < i) d.classList.add('done');
    if (j === i) d.classList.add('current');
  });
  trail.innerHTML = state.lines.map(l => {
    const cls = l.changing ? 'trail-item changing' : 'trail-item';
    return `<span class="${cls}">${l.symbol}</span>`;
  }).join('');
  state.coinStates = ['heads', 'heads', 'heads'];
  // Show placeholder — don't reveal result until user throws
  showPlaceholder();
}

function confirmLine() {
  // Guard: prevent double-lock (e.g. from accidental press during random animation)
  if (state.lines.length > state.currentLine) return;
  lockCurrentLine();
  advanceLine();
}

function randomThrow() {
  const arr = getRandomBytes(3);
  state.coinStates = Array.from(arr).map(v => (v < 128 ? 'heads' : 'tails'));
  renderCoins();
  coinsRow.querySelectorAll('.coin').forEach((el, i) => {
    el.classList.remove('rolling');
    void el.offsetWidth;
    setTimeout(() => el.classList.add('rolling'), i * 60);
  });
  lockCurrentLine();
  setTimeout(() => advanceLine(), 450);
}

/* ================================================================
   RESULT DISPLAY
   ================================================================ */
function showResult() {
  audio.complete();
  haptic.pulse();
  setTimeout(() => haptic.pulse(), 150);

  const binary = buildBinary(state.lines);
  const hexagram = getHexagram(binary);
  const changingLines = state.lines.map((l, i) => l.changing ? i : -1).filter(i => i >= 0);
  const hasChanging = changingLines.length > 0;

  let transformedHexagram = null;
  if (hasChanging) {
    transformedHexagram = getHexagram(transformBinary(binary, state.lines));
  }

  let html = '';

  html += `<div class="hex-palace-header">`;
  html += `<div class="hex-char-frame"><span class="hex-symbol">${hexagram.unicode}</span></div>`;
  html += `<div class="hex-name">${hexagram.full_name}</div>`;
  html += `<div class="hex-id-tag">第 ${hexagram.id} 卦 · ${hexagram.name_cn}</div>`;
  html += `</div>`;

  html += `<div class="lines-stage">`;
  const reversedLines = [...state.lines].reverse();
  const lineLabels = ['上爻','五爻','四爻','三爻','二爻','初爻'];
  reversedLines.forEach((l, i) => {
    const cls = l.line === 'yang' ? 'yang' : 'yin';
    const mark = l.changing ? (l.line === 'yang' ? '○' : '×') : '';
    html += `<div class="line-art-row">`;
    html += `<span class="line-symbol-art">${l.symbol}</span>`;
    html += `<div class="line-drawing ${cls}"></div>`;
    html += `<span class="line-mark-art">${mark}</span>`;
    html += `<span class="line-label-art">${lineLabels[i]}</span>`;
    html += `</div>`;
  });
  html += `</div>`;

  if (hasChanging && transformedHexagram) {
    html += `<div class="transformed-block">`;
    html += `<div class="trans-badge">— 变 卦 —</div>`;
    html += `<div class="trans-symbol">${transformedHexagram.unicode}</div>`;
    html += `<div class="trans-name">${transformedHexagram.full_name} · 第 ${transformedHexagram.id} 卦</div>`;
    html += `</div>`;
  }

  html += `<div class="interp-card"><div class="card-label-text">卦 辞</div><div class="card-body">${hexagram.gua_ci}</div></div>`;
  if (hexagram.tuan_ci) {
    html += `<div class="interp-card"><div class="card-label-text">彖 传</div><div class="card-body">${hexagram.tuan_ci}</div></div>`;
  }
  if (hexagram.da_xiang_ci) {
    html += `<div class="interp-card"><div class="card-label-text">大 象</div><div class="card-body">${hexagram.da_xiang_ci}</div></div>`;
  }
  if (hasChanging) {
    html += `<div class="interp-card changing-card"><div class="card-label-text">动 爻 爻 辞</div>`;
    changingLines.forEach(idx => {
      html += `<div class="card-body" style="margin-bottom:10px"><span class="yao-name-inline">${LINE_NAMES[idx]}</span> · ${hexagram.yao_ci[idx]}</div>`;
    });
    if (hexagram.yong_jiu && changingLines.length === 6) html += `<div class="card-body" style="color:var(--gold-bright)">${hexagram.yong_jiu}</div>`;
    if (hexagram.yong_liu && changingLines.length === 6) html += `<div class="card-body" style="color:var(--gold-bright)">${hexagram.yong_liu}</div>`;
    html += `</div>`;
  }

  resultScroll.innerHTML = html;
  showScreen('result');
  resultScroll._hexagram = hexagram;
  resultScroll._transformed = transformedHexagram;
  resultScroll._changingLines = changingLines;
  resultScroll._hasChanging = hasChanging;
}

/* ================================================================
   PROMPT COPY
   ================================================================ */
function copyPrompt() {
  const hexagram = resultScroll._hexagram;
  const transformed = resultScroll._transformed;
  const changingLines = resultScroll._changingLines;
  const hasChanging = resultScroll._hasChanging;

  let prompt = '你是一位精通周易六爻的易学学者。请根据以下信息为用户解卦。\n\n';
  prompt += state.question
    ? `【用户所问之事】\n${state.question}\n\n`
    : `【用户所问之事】\n（未特别注明，请根据卦象泛解）\n\n`;
  prompt += `【起卦方式】\n手工铜钱起卦（三枚铜钱，掷六次）\n\n`;
  prompt += `【本卦】\n${hexagram.unicode} ${hexagram.full_name}（第${hexagram.id}卦 · ${hexagram.name_cn}）\n\n`;
  prompt += `【爻位记录】（从下往上）\n`;
  const posNames = ['初爻','二爻','三爻','四爻','五爻','上爻'];
  state.lines.forEach((l, i) => {
    prompt += `${posNames[i]}：${l.heads}正${l.tails}反 → ${l.name} ${l.symbol}`;
    if (l.changing) prompt += '（动爻）';
    prompt += '\n';
  });
  prompt += '\n';
  if (hasChanging && transformed) {
    prompt += `【变卦】\n${transformed.unicode} ${transformed.full_name}（第${transformed.id}卦 · ${transformed.name_cn}）\n\n`;
  } else {
    prompt += `【变卦】\n无变卦（六爻皆静）\n\n`;
  }
  prompt += `【卦辞】\n${hexagram.gua_ci}\n\n`;
  if (hexagram.tuan_ci) prompt += `【彖传】\n${hexagram.tuan_ci}\n\n`;
  if (hexagram.da_xiang_ci) prompt += `【大象传】\n${hexagram.da_xiang_ci}\n\n`;
  if (hasChanging) {
    prompt += `【动爻爻辞】\n`;
    changingLines.forEach(idx => { prompt += `${posNames[idx]}：${hexagram.yao_ci[idx]}\n`; });
    if (hexagram.yong_jiu && changingLines.length === 6) prompt += `${hexagram.yong_jiu}\n`;
    if (hexagram.yong_liu && changingLines.length === 6) prompt += `${hexagram.yong_liu}\n`;
    prompt += '\n';
  }
  prompt += `请结合用户所问之事，用通俗中文解读此卦的吉凶趋势和行动建议。`;

  const copyToClipboard = (text) => {
    // Prefer async Clipboard API, but guard against it being missing
    // (e.g. file:// protocol or older browsers where it's undefined)
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
    }
    return Promise.resolve(false);
  };

  const fallbackCopy = (text) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    // Use opacity:0 instead of left:-9999px — some browsers ignore
    // off-screen selections for execCommand('copy')
    ta.style.cssText = 'position:fixed;left:0;top:0;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.select();
    ta.setSelectionRange(0, text.length);
    let ok = false;
    try { ok = document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    return ok;
  };

  copyToClipboard(prompt).then((ok) => {
    if (!ok) fallbackCopy(prompt);
    showToast('已复制 Prompt，粘贴到 ChatGPT 即可');
  });
}

/* ================================================================
   EVENT HANDLERS
   ================================================================ */
$('btnStart').addEventListener('click', () => { audio.init(); startCasting(); });

coinsRow.addEventListener('click', (e) => {
  const coin = e.target.closest('.coin');
  if (!coin) return;
  const idx = parseInt(coin.dataset.coin);
  state.coinStates[idx] = state.coinStates[idx] === 'heads' ? 'tails' : 'heads';
  coin.classList.remove('rolling');
  void coin.offsetWidth;
  coin.classList.add('rolling');
  renderCoins();
  enableConfirm(); // manual coin toggle — allow user to lock this result
});

$('btnConfirm').addEventListener('click', confirmLine);
$('btnRandom').addEventListener('click', () => { audio.init(); randomThrow(); });
$('btnCopyPrompt').addEventListener('click', copyPrompt);
$('btnReset').addEventListener('click', () => {
  state.question = ''; state.currentLine = 0; state.lines = [];
  state.coinStates = ['heads', 'heads', 'heads'];
  questionInput.value = '';
  showScreen('welcome');
});

questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); audio.init(); startCasting(); }
});

/* ================================================================
   PWA SERVICE WORKER
   ================================================================ */
if ('serviceWorker' in navigator) {
  const swCode = `const CACHE='liuyao-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['.'])));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==CACHE).map(x=>caches.delete(x)))));self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

haptic._check();
</script>
